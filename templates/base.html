<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Possum Patrol{% endblock %}</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f4f0; color: #222; font-size: 14px; }

/* ── Nav ── */
.nav { background: #2c3e1e; color: #fff; padding: 0 20px; display: flex; align-items: stretch; gap: 0; height: 52px; }
.nav-brand { display: flex; flex-direction: column; justify-content: center; padding-right: 24px; border-right: 1px solid rgba(255,255,255,0.12); margin-right: 8px; flex-shrink: 0; }
.nav-brand-name { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; color: #fff; white-space: nowrap; }
.nav-brand-sub { font-size: 10px; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 1px; }

.nav-links { display: flex; align-items: stretch; gap: 2px; flex: 1; }
.nav-link { display: flex; align-items: center; gap: 6px; padding: 0 14px; text-decoration: none; color: rgba(255,255,255,0.65); font-size: 13px; font-weight: 500; border-bottom: 3px solid transparent; transition: color 0.1s, border-color 0.1s; white-space: nowrap; }
.nav-link:hover { color: #fff; background: rgba(255,255,255,0.06); }
.nav-link.active { color: #fff; border-bottom-color: #7dbf5c; }
.nav-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 9px; font-size: 10px; font-weight: 700; background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.9); }
.nav-link.active .nav-badge { background: rgba(125,191,92,0.35); color: #fff; }
.nav-badge.badge-alert { background: #c0392b; color: #fff; }

.nav-time { margin-left: auto; display: flex; align-items: center; font-size: 11px; color: rgba(255,255,255,0.4); padding-left: 16px; border-left: 1px solid rgba(255,255,255,0.12); white-space: nowrap; flex-shrink: 0; }

/* ── Shared badge styles (used across all pages) ── */
.badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 10px; white-space: nowrap; }
.badge-EMERGENCY      { background: #fde8e8; color: #c0392b; }
.badge-COMPLAINT      { background: #fef4e4; color: #d35400; }
.badge-VIP_COMMERCIAL { background: #fff8e1; color: #b7880a; }
.badge-QUOTE_REQUEST  { background: #e8f4fd; color: #2471a3; }
.badge-SCHEDULED_SERVICE { background: #eafaf1; color: #1d8348; }
.badge-VENDOR_OPERATIONAL { background: #f4f6f7; color: #5d6d7e; }
.badge-COMMUNITY      { background: #fdf2f8; color: #884ea0; }
.badge-MISC           { background: #f4f6f7; color: #7f8c8d; }
.badge-SPAM           { background: #f4f6f7; color: #aab7b8; }
.badge-WEIRD          { background: #f0f3ff; color: #5b6abf; }
.badge-BLOCKLIST      { background: #f8d7da; color: #721c24; }
.badge-vip            { background: #fff3cd; color: #856404; }
.badge-blocklist      { background: #f8d7da; color: #721c24; }

/* ── Shared button ── */
.btn { font-size: 12px; padding: 5px 12px; border-radius: 5px; border: 1px solid #d0d0d0; cursor: pointer; background: #fff; color: #333; white-space: nowrap; }
.btn:hover { background: #f0f0f0; }
.btn-done { background: #2c3e1e; color: #fff; border-color: #2c3e1e; font-weight: 600; }
.btn-done:hover { background: #1a2512; }
.btn-dismiss { color: #888; }

.empty-state { text-align: center; padding: 40px 20px; color: #aaa; font-size: 13px; }

{% block head_styles %}{% endblock %}
</style>
{% block head_extra %}{% endblock %}
</head>
<body>

<nav class="nav">
  <div class="nav-brand">
    <div class="nav-brand-name">🦝 Possum Patrol</div>
    <div class="nav-brand-sub">Pest Control</div>
  </div>
  <div class="nav-links">
    <a href="/" class="nav-link {% if active_page == 'home' %}active{% endif %}">
      Home
    </a>
    <a href="/inbox" class="nav-link {% if active_page == 'inbox' %}active{% endif %}">
      Inbox
      <span class="nav-badge {% if nav.pending > 0 and active_page != 'inbox' %}badge-alert{% endif %}">{{ nav.pending }}</span>
    </a>
    <a href="/followups" class="nav-link {% if active_page == 'followups' %}active{% endif %}">
      Follow-ups
      <span class="nav-badge {% if nav.open_followups > 0 and active_page != 'followups' %}badge-alert{% endif %}">{{ nav.open_followups }}</span>
    </a>
    <a href="/digest" class="nav-link {% if active_page == 'digest' %}active{% endif %}">
      Morning Digest
    </a>
  </div>
  <div class="nav-time">{{ now.strftime('%-I:%M %p · %a, %b %-d') }}</div>
</nav>

{% block body %}{% endblock %}

{% block scripts %}{% endblock %}
</body>
</html>
